title: Narrative OS
description: NarrativeOS unified documentation hub
url: https://narrativeos.github.io
baseurl: /narrative-docs
remote_theme: just-the-docs/just-the-docs
markdown: kramdown
plugins:
  - jekyll-remote-theme

search_enabled: true
heading_anchors: true

aux_links:
  NarrativeOS:
    - https://github.com/narrativeos
  narrative-docs:
    - https://github.com/narrativeos/narrative-docs

nav_external_links:
  - title: CHANGELOG 更新日志
    url: /narrative-docs/CHANGELOG
  - title: TROUBLESHOOTING 故障排查
    url: /narrative-docs/TROUBLESHOOTING

defaults:
  - scope:
      path: README.md
    values:
      nav_exclude: true

  - scope:
      path: architecture
      type: pages
    values:
      parent: Architecture 架构

  - scope:
      path: product
      type: pages
    values:
      parent: Product 产品

  - scope:
      path: developer
      type: pages
    values:
      parent: Developer 开发者

  - scope:
      path: user
      type: pages
    values:
      parent: User 用户

  - scope:
      path: ai
      type: pages
    values:
      parent: AI 智能体

  - scope:
      path: adr
      type: pages
    values:
      parent: ADR 架构决策记录

  - scope:
      path: whitepaper
      type: pages
    values:
      parent: Governance 治理与标准

  - scope:
      path: API_COMPATIBILITY_AND_VERSIONING.md
    values:
      parent: Governance 治理与标准
  - scope:
      path: CHANGELOG.md
    values:
      parent: Governance 治理与标准
  - scope:
      path: CODE_OF_CONDUCT.md
    values:
      parent: Governance 治理与标准
  - scope:
      path: CONTRIBUTING.md
    values:
      parent: Governance 治理与标准
  - scope:
      path: DATA_CLASSIFICATION_AND_RETENTION.md
    values:
      parent: Governance 治理与标准
  - scope:
      path: GOVERNANCE.md
    values:
      parent: Governance 治理与标准
  - scope:
      path: SECURITY.md
    values:
      parent: Governance 治理与标准
  - scope:
      path: TROUBLESHOOTING.md
    values:
      parent: Governance 治理与标准
  - scope:
      path: WHATS_NEW.md
    values:
