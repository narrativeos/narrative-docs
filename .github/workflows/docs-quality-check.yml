name: Docs Quality Check

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.yaml'
      - '**/*.yml'
      - '**/*.json'
      - 'scripts/*.sh'
      - '.github/workflows/docs-quality-check.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - '**/*.yaml'
      - '**/*.yml'
      - '**/*.json'
      - 'scripts/*.sh'
      - '.github/workflows/docs-quality-check.yml'

jobs:
  docs-consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run unified docs check-all
        run: |
          set -euo pipefail
          chmod +x scripts/docs-consistency-check.sh
          chmod +x scripts/docs-check-all.sh
          make docs-check-all

  docs-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --verbose './**/*.md'
          fail: true
