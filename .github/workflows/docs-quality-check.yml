name: Docs Quality Check

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/docs-quality-check.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - '.github/workflows/docs-quality-check.yml'

jobs:
  docs-consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check placeholder residue
        run: |
          set -euo pipefail
          ! rg -n "This document describes ---|TODO|TBD|FIXME|待补充|占位" --glob '**/*.md'

      - name: Check templated EN summary residue
        run: |
          set -euo pipefail
          ! rg -n "This document describes" --glob '**/*.md'

  docs-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --verbose './**/*.md'
          fail: true
